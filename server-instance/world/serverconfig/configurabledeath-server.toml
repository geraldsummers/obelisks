
#Inventory drop settings
[itemDrops]
	#Should players keep their entire inventory on death?
	keepInventory = true
	#Should players keep their armor on death?
	keepArmor = true
	#Should players keep their non-mainhand hotbar items on death?
	keepHotbar = true
	#Should players keep their mainhand item on death?
	keepMainhand = true
	#Should players keep their offhand item on death?
	keepOffhand = true
	#Set to true to keep main inventory (non-equipped non-hotbar) items on death
	keepMainInventoryOnDeath = true
	#Specific overrides for damage source + inventory part combinations.
	#Format: "damageSource:part:action" (colon-separated)
	#
	#Priority order:
	#  1. Specific rules (this config) - override base config for that part
	#  2. Base config (keepHotbar, keepArmor, etc.) - default behavior
	#
	#Available damage source types:
	#  - player: Killed by another player (PvP)
	#  - mob: Killed by a mob
	#  - arrow: Killed by an arrow
	#  - fall: Fall damage
	#  - fire: Fire damage
	#  - lava: Lava damage
	#  - drown: Drowning
	#  - explosion: Explosion damage
	#  - magic: Magic damage
	#  - wither: Wither effect
	#  - starve: Starvation
	#  - cactus: Cactus damage
	#  - sweetBerryBush: Sweet berry bush damage
	#  - sting: Bee sting
	#  - thorns: Thorns enchantment
	#  - outOfWorld: Void damage
	#  - generic: Generic damage
	#  - onFire: On fire
	#  - inFire: In fire
	#  - lightningBolt: Lightning strike
	#  - hotFloor: Magma block damage
	#  - inWall: Suffocation
	#  - cramming: Entity cramming
	#  - dryout: Dry out
	#  - freeze: Freezing
	#  - stalagmite: Stalagmite damage
	#  - outsideBorder: Outside world border
	#  - genericKill: Generic kill
	#
	#Parts: hotbar, armor, mainhand, offhand, mainInventory, inventory (all items)
	#Actions: drop (force drop) or keep (force keep)
	#
	#Examples:
	#  "player:hotbar:drop" - Hotbar drops on PvP deaths (even if keepHotbar=true)
	#  "lava:armor:keep" - Armor always kept on lava deaths (even if keepArmor=false)
	#  "player:inventory:drop" - Entire inventory drops on PvP deaths (whitelist behavior)
	#  "fall:inventory:keep" - Entire inventory kept on fall damage (blacklist behavior)
	#  "fall:hotbar:keep" - Hotbar always kept on fall damage
	#
	#Note: Rules are evaluated per-part, so you can mix different behaviors.
	#Example: keepHotbar=true, but "player:hotbar:drop" means hotbar kept normally, dropped on PvP.
	damageSourceRules = []

#Durability loss settings
[durability]
	#Percent of durability lost on death for kept items
	#Range: 0.0 ~ 1.0
	durabilityLossOnKeptItems = 0.0
	#Percent of durability lost on death for drops
	#Range: 0.0 ~ 1.0
	durabilityLossOnDrops = 0.0

#Experience settings
[experience]
	#Enable experience settings
	enableExperienceModule = true
	#Percent of experience dropped on death
	#Range: 0.0 ~ 1.0
	droppedXPPercent = 1
	#Percent of dropped experience that can be recovered
	#Range: 0.0 ~ 1.0
	recoverableXPPercent = 0

#Hunger settings
[hunger]
	#Set to true to retain food level on death
	keepFoodLevel = true
	#Highest amount of food level you can respawn with
	#Range: 0 ~ 20
	maxFoodLevel = 8
	#Lowest amount of food level you can respawn with
	#Range: 0 ~ 20
	minFoodLevel = 8
	#Set to true to retain saturation on death
	keepSaturation = true

#Debug settings
[debug]
	#Enable detailed logging for debugging purposes. Set to false to reduce log spam.
	enableDetailedLogging = false

