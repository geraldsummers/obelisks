["Miscellaneous Settings"]
	#How long will it take to crave something different. (Default: 12000)
	#If you change this, make sure to tweak the effect's durations below to keep it balanced.
	#Changing the effects to last half of this is a good starting point.
	#Range: > 1
	"Time Between Cravings" = 12000
	#Enable potion effect particles for benefits gained by satisfying cravings. (default: false)
	#If true, ambient particles will be used, which are less intrusive and less visible.
	"Toggle Effect Particles" = false
	#Toggles whether craving reminder effects display a countdown timer
	#When disabled, all cravings will show as “Infinite,” hiding the time left until the next craving. (default: true)
	"Craving Timer Display" = true

#Craving Weights. These determine the chances of each craving triggering compared to each other.
#Weights are used instead of straight up chances. The higher the weight in comparison with the others, the higher the chance.
#Example: If Sweet = 40 and Healthy = 20, then Sweet has double the chance of being picked than healthy.
["Craving Weights"]
	#Chance to crave something sweet. (Default: 20)
	#Range: 1 ~ 1000
	"Sweet Craving Chance" = 20
