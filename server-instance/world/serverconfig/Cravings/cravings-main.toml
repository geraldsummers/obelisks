["Streak Settings"]
	#Number of consecutive cravings that must be satisfied to trigger a streak bonus. (default = 5)
	#Range: > 1
	"Streak Amount" = 5
	#Extra experience points granted on top of the base reward when a streak bonus is triggered. (default = 5)
	#Range: > 0
	"Bonus XP" = 5
	#Extra saturation granted on top of the base reward when a streak bonus is triggered. (default = 3)
	#Range: 0.0 ~ 20.0
	"Bonus Saturation" = 3.0
	#Additional effect amplifier levels added to the reward effect during a streak bonus. (default = 0)
	#Range: 0 ~ 255
	"Bonus Level" = 0
	#Extra duration (in ticks) added to the reward effect during a streak bonus. (default = 2400)
	#Range: > 0
	"Bonus Duration" = 2400

["Palate Cleanser Settings"]
	#Toggles whether drinking a Palate Cleanser applies the Upset Stomach effect as a cooldown.
