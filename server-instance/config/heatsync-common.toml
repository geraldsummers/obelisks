
[mapping]
	#CNA heat value that corresponds to Cold Sweat 0 MC / 0 C.
	#Range: 0.0 ~ 1.7976931348623157E308
	absolute_zero_offset = 100.0
	#How many CNA heat units correspond to one Cold Sweat MC unit.
	#Range: 1.0E-4 ~ 1.7976931348623157E308
	cs_to_cna_scale = 40.0
	#Minimum pipe heat. Zero is absolute zero in the bridge model.
	#Range: 0.0 ~ 1.7976931348623157E308
	pipe_min_heat = 0.0
	#Maximum pipe heat.
	#Range: 0.0 ~ 1.7976931348623157E308
	pipe_max_heat = 400.0

[pipe_behavior]
	#How strongly local Cold Sweat ambient pulls pipe heat toward its baseline each update.
	#Range: 0.0 ~ 1.0
	ambient_blend_rate = 0.08
	#Passive loss toward CNA zero per update.
	#Range: 0.0 ~ 1.7976931348623157E308
	pipe_loss_per_tick = 0.5
	#How strongly connected neighbors pull a pipe toward their average heat.
	#Range: 0.0 ~ 1.0
	network_equalization_strength = 0.3
	#How strongly adjacent cold sources pull a pipe toward their source heat.
	#Range: 0.0 ~ 1.0
	cold_source_pull_rate = 0.18

[cold_sources]
	#Target CNA heat for adjacent ice.
	#Range: 0.0 ~ 1.7976931348623157E308
	ice_source_heat = 80.0
	#Target CNA heat for adjacent packed ice.
	#Range: 0.0 ~ 1.7976931348623157E308
	packed_ice_source_heat = 50.0
	#Target CNA heat for adjacent blue ice.
	#Range: 0.0 ~ 1.7976931348623157E308
	blue_ice_source_heat = 20.0
	#Target heat for any other block in heatsync:pipe_cold_sources.
	#Range: 0.0 ~ 1.7976931348623157E308
	tagged_cold_source_default_heat = 80.0

[radiation]
	#How far pipe-emitted Cold Sweat block temperature reaches.
	#Range: 0.0 ~ 1.7976931348623157E308
	pipe_blocktemp_range = 5.0
	#Absolute Cold Sweat MC temperature cap emitted by a pipe.
	#Range: 0.0 ~ 1.7976931348623157E308
	pipe_blocktemp_max_effect = 0.75

