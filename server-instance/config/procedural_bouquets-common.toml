#Maximum flowers stored/rendered in a bouquet
#Range: 1 ~ 256
maxFlowersPerBouquet = 64
#If true, flowers are consumed in creative mode
consumeFlowersInCreative = false
#If true, sneaking with flower can replace an occupied cell
allowReplacementWhenSneaking = true
#If true, fallback to individual drops when bouquet creation fails
dropIndividualFlowersIfBouquetInvalid = true

